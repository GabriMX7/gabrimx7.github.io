<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site com YouTube, Discord e Data</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script>
        // Função para obter a data atual
        function mostrarDataAtual() {
            const data = new Date();
            const dia = String(data.getDate()).padStart(2, '0');
            const mes = String(data.getMonth() + 1).padStart(2, '0');
            const ano = data.getFullYear();
            document.getElementById("dataAtual").innerText = `${dia}/${mes}/${ano}`;
        }
    </script>
</head>
<body onload="mostrarDataAtual()">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="#">Meu Site</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="#youtube">YouTube</a></li>
                <li class="nav-item"><a class="nav-link" href="#discord">Discord</a></li>
            </ul>
        </div>
    </nav>

    <!-- Banner -->
    <header class="jumbotron text-center" style="background-color: #333; color: white;">
        <h1>Bem-vindo ao Meu Site</h1>
        <p>Data de hoje: <span id="dataAtual"></span></p>
        <p>Confira nosso canal no YouTube e junte-se à nossa comunidade no Discord!</p>
    </header>

    <!-- Seção YouTube -->
    <section id="youtube" class="container text-center py-5">
        <h2>Vídeos do YouTube</h2>
        <div class="row">
            <div class="col-md-4">
                <iframe width="100%" height="auto" src="https://www.youtube.com/embed/ID_DO_VIDEO1" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="col-md-4">
                <iframe width="100%" height="auto" src="https://www.youtube.com/embed/ID_DO_VIDEO2" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="col-md-4">
                <iframe width="100%" height="auto" src="https://www.youtube.com/embed/ID_DO_VIDEO3" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
        <a href="https://www.youtube.com/seucanal" class="btn btn-danger mt-3" target="_blank">Visitar Canal</a>
    </section>

    <!-- Seção Discord -->
    <section id="discord" class="container text-center py-5 bg-light">
        <h2>Junte-se ao Discord</h2>
        <p>Conecte-se com nossa comunidade no Discord.</p>
        <a href="https://discord.gg/SEU-LINK-DE-INVITE" class="btn btn-primary" target="_blank">Entrar no Discord</a>
    </section>

    <footer class="text-center bg-dark text-light py-3">
        <p>&copy; 2023 Meu Site</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
