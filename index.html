<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA San Andreas - Meu Site</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin-top: 50px;
        }
        a {
            color: #fff;
            text-decoration: none;
            font-size: 20px;
            padding: 10px;
            margin: 20px;
            display: inline-block;
            border: 2px solid #fff;
            border-radius: 5px;
        }
        a:hover {
            background-color: #fff;
            color: #000;
        }
        footer {
            margin-top: 50px;
        }
        #data-hora {
            font-size: 18px;
            margin-top: 20px;
        }
        .images-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        .image {
            width: 300px;
            height: auto;
            margin: 10px;
            border-radius: 5px;
        }
        .video-container {
            margin-top: 30px;
        }
        iframe {
            width: 560px;
            height: 315px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Bem-vindo ao site de GTA San Andreas!</h1>
    <p>Este site está hospedado no GitHub Pages. Confira o conteúdo abaixo:</p>

    <!-- Link para o Discord -->
    <a href="https://discord.gg/seulinkdiscord" target="_blank">Entre no meu Discord</a>

    <!-- Link para o YouTube -->
    <a href="https://www.youtube.com/c/seucanal" target="_blank">Visite meu canal no YouTube</a>

    <!-- Exibir imagens do GTA San Andreas -->
    <div class="images-container">
        <h2>Imagens de GTA San Andreas</h2>
        <img src="https://via.placeholder.com/300x200.png?text=GTA+SA+1" alt="GTA SA 1" class="image">
        <img src="https://via.placeholder.com/300x200.png?text=GTA+SA+2" alt="GTA SA 2" class="image">
        <img src="https://via.placeholder.com/300x200.png?text=GTA+SA+3" alt="GTA SA 3" class="image">
    </div>

    <!-- Links de vídeos do YouTube -->
    <div class="video-container">
        <h2>Assista a alguns vídeos de GTA San Andreas:</h2>
        <iframe src="https://www.youtube.com/embed/videoID1" title="GTA SA Video 1" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/videoID2" title="GTA SA Video 2" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <!-- Exibir a data e hora atuais -->
    <div id="data-hora"></div>

    <footer>
        <p>Data de criação: 06 de novembro de 2024</p>
    </footer>

    <script>
        // Função para formatar a data e hora
        function mostrarDataHora() {
            const data = new Date();
            const dia = data.getDate().toString().padStart(2, '0');
            const mes = (data.getMonth() + 1).toString().padStart(2, '0');
            const ano = data.getFullYear();
            const horas = data.getHours().toString().padStart(2, '0');
            const minutos = data.getMinutes().toString().padStart(2, '0');
            const segundos = data.getSeconds().toString().padStart(2, '0');
            const horaFormatada = `${dia}/${mes}/${ano} - ${horas}:${minutos}:${segundos}`;

            document.getElementById('data-hora').innerText = `Data e Hora Atual: ${horaFormatada}`;
        }

        // Atualizar a data e hora a cada segundo
        setInterval(mostrarDataHora, 1000);

        // Exibir a data e hora inicialmente
        mostrarDataHora();
    </script>
</body>
</html>
